<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>The Uncertainty-Ready Leader</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --ink:#f2f4f7; --muted:#9aa4b2;
    --line:#2a313c; --accent:#00ff00; --accent-ink:#0e1116;
    --ok:#3fb27f; --warn:#d98c4a; --radius:14px;
    --maxw:640px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:28px 20px 72px;min-height:100dvh;display:flex;flex-direction:column}
  .brand{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px}
  h1{font-size:26px;line-height:1.2;margin:.1em 0 .4em;font-weight:650}
  h2{font-size:21px;line-height:1.25;margin:.2em 0 .5em;font-weight:600}
  p{margin:.5em 0;color:var(--ink)}
  .muted{color:var(--muted)}
  .small{font-size:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin:14px 0}
  label.field{display:block;margin:14px 0 6px;font-weight:600;font-size:15px}
  input[type=text],input[type=email],input[type=date],textarea{
    width:100%;background:#0b0f14;border:1px solid var(--line);border-radius:10px;
    color:var(--ink);padding:13px 14px;font-size:16px;font-family:inherit}
  input[type=date]{min-height:48px}
  textarea{min-height:96px;resize:vertical}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .btn{appearance:none;border:0;border-radius:999px;background:var(--accent);color:var(--accent-ink);
    font-weight:700;font-size:16px;padding:15px 22px;width:100%;cursor:pointer;margin-top:18px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600}
  .q{padding:16px 0;border-bottom:1px solid var(--line)}
  .q:last-child{border-bottom:0}
  .q .qtext{font-size:16px;font-weight:550;margin-bottom:12px}
  /* 11-column grid: all of 0..10 always fit one row and shrink uniformly,
     so 9 and 10 never wrap or render oversized on a narrow phone in portrait. */
  .scale{display:grid;grid-template-columns:repeat(11,minmax(0,1fr));gap:3px}
  .scale button{min-width:0;width:100%;background:#0b0f14;border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:12px 0;font-size:14px;font-weight:600;cursor:pointer}
  .scale button[aria-pressed=true]{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .scale-ends{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted);margin-top:7px}
  /* 0 to 10 slider */
  .readout{text-align:center;font-size:46px;font-weight:800;line-height:1;color:var(--accent);margin:4px 0 10px}
  .readout.dash{color:var(--muted);font-weight:600}
  input[type=range].slider{-webkit-appearance:none;appearance:none;width:100%;height:16px;border-radius:999px;
    background:#0b0f14;border:1px solid var(--line);outline:none;margin:6px 0 2px;cursor:pointer}
  input[type=range].slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:36px;height:36px;
    border-radius:50%;background:var(--accent);border:4px solid #0b0f14;box-shadow:0 0 0 1px var(--line);cursor:pointer}
  input[type=range].slider::-moz-range-thumb{width:36px;height:36px;border-radius:50%;background:var(--accent);
    border:4px solid #0b0f14;box-shadow:0 0 0 1px var(--line);cursor:pointer}
  input[type=range].slider.untouched::-webkit-slider-thumb{background:#3a414c}
  input[type=range].slider.untouched::-moz-range-thumb{background:#3a414c}
  .choice{display:block;width:100%;text-align:left;background:#0b0f14;border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:14px 16px;font-size:16px;cursor:pointer;margin-top:10px}
  .choice[aria-pressed=true]{border-color:var(--accent);background:rgba(0,255,0,.10)}
  .privacy{font-size:13px;color:var(--muted);border-left:2px solid var(--accent);padding:6px 0 6px 12px;margin:16px 0}
  .anon{font-size:12px;letter-spacing:.04em;color:var(--ok);font-weight:600;margin-top:6px}
  .progress{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .center{text-align:center;margin:auto 0}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 1.4s infinite ease-in-out}
  @keyframes pulse{0%,100%{opacity:.25;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}
  .err{color:var(--warn);font-size:14px;margin-top:8px;min-height:18px}
  .lens-tag{display:inline-block;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:8px}
  .net{position:fixed;bottom:0;left:0;right:0;background:var(--warn);color:#1a1205;text-align:center;
    font-size:13px;padding:8px;display:none}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="center"><span class="dot"></span></div></div>
<div class="net" id="netbar">Saving offline. Your answers are kept on this device and will sync.</div>

<script>
/* =========================================================================
   THE UNCERTAINTY-READY LEADER  participant web app
   Implements the locked Measurement Battery v2.0 (Katherine, 19 June 2026)
   per URL_App_Locked_Measures_Spec_for_Code_v2.md. Item wording, IDs, scale,
   timing and weighting are locked; do not change without a new version.

   Single page, vanilla JS, no runtime dependencies (resilient on phones).
   Writes to Supabase (participant + response), paired by a browser token.
   Anonymity paramount: email kept client-side only, never stored next to answers.
   Top-level payload keys (horizon, altitude, agency, control, utos, paradox)
   are unchanged so session_aggregates and the live dashboard keep working.
   ========================================================================= */

/* ---- Supabase (publishable/anon key is safe in the client) ---- */
const SB_URL = "https://aevfmmgqfngygnfxcvec.supabase.co";
const SB_KEY = "sb_publishable_mHR6CteMYx7ZlnyIoZorvg_rDliOubk";

/* ---- Sessions (QR carries ?s=<code>) ---- */
const SESSIONS = {
  "doodle-2026-06-22":  { label: "Doodle, Monday" },
  "forward-2026-06-25": { label: "Forward Institute, Thursday" }
};
const DEFAULT_SESSION = "doodle-2026-06-22"; // fallback if ?s= is missing

/* ===================== LOCKED CONTENT v2.0 (do not reword) ===================== */
const CONTENT = {
  /* 0 to 10 scale, used for all quantitative items and the qpre3 permission item. */
  scale: { min: 0, max: 10, minLabel: "Not at all like me right now", maxLabel: "Completely like me right now" },

  /* Paradox (canonical SOUS version, signed off). Forced binary, stored raw, NOT in HTO.
     Mapping: A = decisive/negative, B = indecisive/positive (the better outcome).
     paradox_b_pct = share choosing B, expected to rise post (matches the dashboard). */
  paradox: {
    id: "paradox",
    prompt: "Amidst profound uncertainty, in front of your peers, would you prefer to be:",
    optionA: "Decisive, even if it eventually led to a negative outcome.",
    optionB: "Indecisive, if that eventually led to a positive outcome."
  },

  /* The three lenses, 3 items each, averaged to the lens score. */
  lenses: [
    { key: "horizon", label: "Horizon", ids: ["H1","H2","H3"] },
    { key: "altitude", label: "Altitude", ids: ["A1","A2","A3"] },
    { key: "agency", label: "Agency", ids: ["AG1","AG2","AG3"] }
  ],

  /* Exact item wording (signed off), keyed by stable ID. */
  items: {
    H1: "I can see the longer-term human stakes of the uncertain decisions I am carrying, not only the near-term pressure.",
    H2: "I can hold meaningful time horizons in mind when faced with uncertain decisions, the point where the decision will land, not just when it is due.",
    H3: "When making decisions, I can distinguish between what feels urgent and what is actually important.",
    A1: "I can step back and see the wider terrain around the uncertain decisions I am carrying.",
    A2: "I am clear on whose perspective I am still missing when facing uncertain decisions.",
    A3: "I can clearly articulate a view that completely challenges my own when facing uncertain decisions.",
    AG1: "I am confident I can work my way to a good decision under uncertainty.",
    AG2: "I can see my own part in what I am facing, not just the external blockers, when making a decision under uncertainty.",
    AG3: "My emotional reaction to uncertainty feels like information I can use, not a verdict on my capability, when making a decision."
  },

  /* Post-only confidence item, stored raw under top-level ag5, NOT in any average. */
  agencyPostOnly: { id: "AG5", text: "Having worked through this session, I feel more confident I can reach a good decision on what I am carrying." },

  /* Control (trait). C1 is the single control; it feeds the top-level control key. */
  control: { id: "C1", text: "My core beliefs about how to lead have stayed broadly consistent over the past few years." },

  /* Qualitative, pre-session: the opener (q1, q2), shown before the scored items
     to frame the challenge. Stored keys unchanged. */
  qualPreOpen: [
    { id: "q1", type: "text", text: "What's the main uncertainty facing you today?" },
    { id: "q2", type: "text", text: "What is an opportunity in it for you?" }
  ],

  /* Qualitative, post-session: one question. */
  qualPost: [
    { id: "q1", type: "text", text: "What, if anything, has shifted in how you'll approach the decisions you're carrying?" }
  ],

  /* The during phase (facilitated reflection) is built screen-by-screen below,
     not from a config block. Its data model lives in duringPayload(). */

  privacy: "Your answers are anonymous. We use your email only to send you your own reflections afterwards. Data is held securely in our own UK database."
};
/* ============================================================================== */

/* ---------------------------- small helpers ---------------------------- */
const el = (html) => { const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; };
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function getSession(){
  const p = new URLSearchParams(location.search).get("s");
  if (p) return p;            // unknown codes accepted as-is (facilitator may add them)
  return DEFAULT_SESSION;
}
const SESSION = getSession();
const LS_KEY = "url2:" + SESSION;

function loadState(){ try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){ return {}; } }
function saveState(){ try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){} }

let state = loadState();
/* A finished run starts fresh when the link is reopened, so the same phone (or a
   repeat go) doesn't land on the closing "That is everything" screen. An UNFINISHED
   run still resumes, so a dropped signal mid-session never loses progress. */
if (state.stage === "close") state = {};
if (!state.token) state.token = (crypto.randomUUID ? crypto.randomUUID()
  : "t-"+Date.now()+"-"+Math.random().toString(16).slice(2));
if (!state.stage) state.stage = "welcome";
state.preAns = state.preAns || {};   state.qpreAns = state.qpreAns || {};
state.postAns = state.postAns || {};  state.qpostAns = state.qpostAns || {};
state.during = state.during || {};
saveState();

/* ---------------------------- resilient inserts ---------------------------- */
/* Failed writes queue in localStorage so a dropped phone signal never loses data;
   the queue flushes on load, when back online, and after each write. */
const Q_KEY = "url2:queue";
function queueGet(){ try { return JSON.parse(localStorage.getItem(Q_KEY))||[]; } catch(e){ return []; } }
function queueSet(q){ try { localStorage.setItem(Q_KEY, JSON.stringify(q)); } catch(e){} }
function showNet(on){ document.getElementById("netbar").style.display = on ? "block" : "none"; }

async function postRow(table, body){
  const res = await fetch(SB_URL + "/rest/v1/" + table, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json", "Prefer": "return=minimal" },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(table + " insert failed: " + res.status + " " + (await res.text()));
  return true;
}
async function flushQueue(){
  let q = queueGet();
  if (!q.length){ showNet(false); return; }
  const remaining = [];
  for (const item of q){ try { await postRow(item.table, item.body); } catch(e){ remaining.push(item); } }
  queueSet(remaining);
  showNet(remaining.length > 0);
}
async function insertRow(table, body){
  try { await postRow(table, body); showNet(false); return true; }
  catch(e1){
    try { await postRow(table, body); showNet(false); return true; }
    catch(e2){ const q = queueGet(); q.push({ table, body }); queueSet(q); showNet(true); console.warn("Queued for retry:", table, e2.message); return false; }
  }
}

/* ---------------------------- scoring ---------------------------- */
function lensMean(ans, ids){
  const xs = ids.map(id=>ans[id]).filter(v=>typeof v==="number");
  if (!xs.length) return null;
  return xs.reduce((a,b)=>a+b,0)/xs.length;
}
/* Build the pre or post battery payload exactly per the locked contract. */
function buildBatteryPayload(phase){
  const ans = phase==="pre" ? state.preAns : state.postAns;
  const q   = phase==="pre" ? state.qpreAns : state.qpostAns;
  const means = {};
  CONTENT.lenses.forEach(L => means[L.key] = lensMean(ans, L.ids));
  const utos = (means.horizon + means.altitude + means.agency) / 3; // HTO, equal-weight
  const items = {};
  CONTENT.lenses.forEach(L => L.ids.forEach(id => items[id] = ans[id]));
  items.C1 = ans.C1;
  const payload = {
    paradox: ans.paradox || null,
    items,
    horizon: means.horizon, altitude: means.altitude, agency: means.agency,
    control: ans.C1,   // top-level control = C1 (primary trait) so the dashboard reads flat
    utos               // HTO composite, stored under utos so session_aggregates is unchanged
  };
  if (phase === "pre"){
    payload.qual_pre = { q1: q.q1||"", q2: q.q2||"" };
  } else {
    payload.ag5 = (typeof ans.AG5==="number") ? ans.AG5 : null; // post-only, raw, not in averages
    payload.qual_post = { q1: q.q1||"" };
  }
  return payload;
}

/* ---------------------------- render ---------------------------- */
const app = document.getElementById("app");
function render(){
  saveState();
  app.innerHTML = "";
  const view = ({
    welcome: viewWelcome,
    pre_intro: viewPreIntro,
    hold_opener: viewHoldOpener,
    pre_battery: () => viewBattery("pre"),
    hold_a: viewHoldA,
    s1: viewS1,
    hold_b: viewHoldB,
    s2: viewS2,
    s3: viewS3,
    hold_c: viewHoldC,
    s4: viewS4,
    s5: viewS5,
    s6: viewS6,
    hold_d: viewHoldD,
    post_battery: () => viewBattery("post"),
    post_qual: () => viewQual("post"),
    post_hold: viewPostHold,
    close: viewClose
  })[state.stage] || viewWelcome;
  app.appendChild(view());
  window.scrollTo(0,0);
}

/* ---- widgets ---- */
/* A 0 to 10 slider (kinder on a phone than eleven tiny buttons). It stays
   visibly UNSET until the participant moves it, so we can still tell a genuine
   answer from an untouched control: ans[id] is only written on first input, and
   the Next button stays gated until then. The locked 0 to 10 range is unchanged. */
function scaleRow(text, current, onPick){
  const has = typeof current === "number";
  const wrap = el(`<div class="q"><div class="qtext">${esc(text)}</div></div>`);
  const readout = el(`<div class="readout${has ? "" : " dash"}">${has ? current : "&ndash;"}</div>`);
  const slider = el(`<input type="range" min="${CONTENT.scale.min}" max="${CONTENT.scale.max}" step="1" value="${has ? current : Math.round((CONTENT.scale.min+CONTENT.scale.max)/2)}" class="slider${has ? "" : " untouched"}" aria-label="0 to 10" />`);
  slider.addEventListener("input", ()=>{
    /* In place: no re-render on a drag, so the page never jumps. */
    slider.classList.remove("untouched");
    readout.classList.remove("dash");
    const n = Number(slider.value);
    readout.textContent = String(n);
    onPick(n);
  });
  wrap.appendChild(readout);
  wrap.appendChild(slider);
  wrap.appendChild(el(`<div class="scale-ends"><span>${esc(CONTENT.scale.minLabel)}</span><span>${esc(CONTENT.scale.maxLabel)}</span></div>`));
  return wrap;
}

/* ---------------- Welcome ---------------- */
function viewWelcome(){
  const node = el(`<div>
    <div class="brand">The Uncertainty-Ready Leader</div>
    <h1>Welcome</h1>
    <p class="muted small">${esc(SESSIONS[SESSION]?.label || SESSION)}</p>
    <p>A short check-in before we begin, and again at the end. Answer on instinct. There are no right answers.</p>
    <div class="card">
      <label class="field" for="fn">Your first name</label>
      <input id="fn" type="text" autocomplete="given-name" placeholder="First name" value="${esc(state.first_name||"")}" />
      <label class="field" for="em">Your email</label>
      <input id="em" type="email" autocomplete="email" inputmode="email" placeholder="you@example.com" value="${esc(state.email||"")}" />
      <div class="privacy">${esc(CONTENT.privacy)}</div>
      <div class="err" id="welErr"></div>
      <button class="btn" id="start">Begin</button>
    </div>
  </div>`);
  node.querySelector("#start").addEventListener("click", async ()=>{
    const fn = node.querySelector("#fn").value.trim();
    const em = node.querySelector("#em").value.trim();
    const err = node.querySelector("#welErr");
    if (!fn){ err.textContent = "Please add your first name."; return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){ err.textContent = "Please add a valid email so we can send your reflections."; return; }
    state.first_name = fn; state.email = em;
    const btn = node.querySelector("#start"); btn.disabled = true; btn.textContent = "One moment.";
    /* PRIVACY: email is NOT persisted next to answers. It stays in localStorage only,
       to be handed to the server-side email function at send time if the participant
       opts in at the end. The participant row is anonymous: token + session + first name. */
    await insertRow("participant", { token: state.token, session_code: SESSION, first_name: fn });
    state.stage = "pre_intro"; render();
  });
  return node;
}

/* ---------------- Pre intro: name the challenge, then the paradox ---------------- */
/* The scored items refer to "this challenge" and "the decisions I am carrying",
   so the participant frames a challenge here first. Opener q1/q2 (stored keys
   unchanged) then the Decisiveness Paradox, before any scored item. */
function viewPreIntro(){
  const ans = state.preAns;
  const q = state.qpreAns;
  const node = el(`<div>
    <div class="progress">Before we begin</div>
    <h2>The challenge you are bringing</h2>
    <p class="muted small">Name what is on your mind first. The questions that follow refer back to it.</p>
    <div class="card" id="introbox"></div>
    <div class="err" id="introErr"></div>
    <button class="btn" id="next">Continue</button>
  </div>`);
  const box = node.querySelector("#introbox");

  /* Opener: q1, q2 (open text). */
  CONTENT.qualPreOpen.forEach(item => {
    const qd = el(`<div class="q"><div class="qtext">${esc(item.text)}</div></div>`);
    const ta = el(`<textarea placeholder="Write as much or as little as you like."></textarea>`);
    ta.value = q[item.id] || "";
    ta.addEventListener("input", ()=>{ q[item.id]=ta.value; saveState(); });
    qd.appendChild(ta);
    box.appendChild(qd);
  });

  /* Decisiveness Paradox (stored A/B per locked mapping). */
  const par = el(`<div class="q"><div class="qtext">${esc(CONTENT.paradox.prompt)}</div></div>`);
  [["A",CONTENT.paradox.optionA],["B",CONTENT.paradox.optionB]].forEach(([k,txt])=>{
    const c = el(`<button type="button" class="choice" data-k="${k}" aria-pressed="${ans.paradox===k}">${esc(txt)}</button>`);
    c.addEventListener("click", ()=>{
      par.querySelectorAll(".choice").forEach(cc => cc.setAttribute("aria-pressed", String(cc.getAttribute("data-k")===k)));
      ans.paradox=k; saveState(); /* no render: keep scroll position */
    });
    par.appendChild(c);
  });
  box.appendChild(par);

  node.querySelector("#next").addEventListener("click", ()=>{
    const err = node.querySelector("#introErr");
    if (!ans.paradox){ err.textContent="Please choose one of the two options."; return; }
    state.stage = "hold_opener"; render();
  });
  return node;
}

/* ---------------- Quantitative battery (pre and post) ----------------
   One question per screen (Typeform-style), so nothing is squidged on a phone
   and only one item is ever in view. The locked 0 to 10 scale and item wording
   are unchanged. Progress and a Back button are added; answers persist in state
   so a reload resumes on the same item. */
function batterySteps(isPre){
  const steps = [];
  if (!isPre) steps.push({ type:"paradox" });                 // POST asks the paradox here (PRE asks it on the intro)
  CONTENT.lenses.forEach(L => L.ids.forEach(id => steps.push({ type:"scale", id, text: CONTENT.items[id] })));
  if (!isPre) steps.push({ type:"scale", id:"AG5", text: CONTENT.agencyPostOnly.text }); // post-only confidence item
  steps.push({ type:"scale", id:"C1", text: CONTENT.control.text });
  return steps;
}
function viewBattery(phase){
  const isPre = phase === "pre";
  const ans = isPre ? state.preAns : state.postAns;
  const idxKey = isPre ? "preBatIdx" : "postBatIdx";
  const steps = batterySteps(isPre);
  let idx = state[idxKey] || 0;
  if (idx > steps.length - 1) idx = steps.length - 1;
  const step = steps[idx];

  const node = el(`<div>
    <div class="progress">${isPre ? "Before we begin" : "One last check-in"} &middot; ${idx+1} of ${steps.length}</div>
    <h2>${isPre ? "How things sit right now" : "How things sit now"}</h2>
    <div class="card" id="battery"></div>
    <div class="err" id="batErr"></div>
    <button class="btn" id="next">${idx === steps.length-1 ? "Continue" : "Next"}</button>
    <div id="backrow"></div>
  </div>`);
  const box = node.querySelector("#battery");

  if (step.type === "paradox"){
    box.appendChild(el(`<p class="muted small" style="margin-top:0">There is no right answer. Choose the one that fits.</p>`));
    const par = el(`<div class="q"><div class="qtext">${esc(CONTENT.paradox.prompt)}</div></div>`);
    [["A",CONTENT.paradox.optionA],["B",CONTENT.paradox.optionB]].forEach(([k,txt])=>{
      const c = el(`<button type="button" class="choice" data-k="${k}" aria-pressed="${ans.paradox===k}">${esc(txt)}</button>`);
      c.addEventListener("click", ()=>{
        par.querySelectorAll(".choice").forEach(cc => cc.setAttribute("aria-pressed", String(cc.getAttribute("data-k")===k)));
        ans.paradox=k; saveState(); /* no render: keep scroll position */
      });
      par.appendChild(c);
    });
    box.appendChild(par);
  } else {
    box.appendChild(el(`<p class="muted small" style="margin-top:0">Answer on instinct, on a scale of 0 to 10.</p>`));
    box.appendChild(scaleRow(step.text, ans[step.id], (n)=>{ ans[step.id]=n; saveState(); /* no render: keep scroll position */ }));
  }

  /* Back, available once past the first item, so a mistap can be corrected. */
  if (idx > 0){
    const back = el(`<button class="btn secondary" id="back">Back</button>`);
    back.addEventListener("click", ()=>{ state[idxKey] = idx-1; render(); });
    node.querySelector("#backrow").appendChild(back);
  }

  node.querySelector("#next").addEventListener("click", async ()=>{
    const err = node.querySelector("#batErr");
    /* Validate just this screen's answer. */
    if (step.type === "paradox"){
      if (!ans.paradox){ err.textContent="Please choose one of the two options."; return; }
    } else if (typeof ans[step.id] !== "number"){
      err.textContent="Please choose a number from 0 to 10."; return;
    }
    /* Advance, or finalise on the last item. */
    if (idx < steps.length - 1){ state[idxKey] = idx+1; render(); return; }
    if (isPre){
      const btn = node.querySelector("#next"); btn.disabled=true; btn.textContent="Saving.";
      const payload = buildBatteryPayload("pre");
      await insertRow("response", { token: state.token, session_code: SESSION, phase: "pre", payload });
      state.stage = "hold_a"; render();
    } else {
      state.stage = "post_qual"; render();
    }
  });
  return node;
}

/* ---------------- Qualitative, post-session (one question) ---------------- */
function viewQual(_phase){
  const store = state.qpostAns;
  const node = el(`<div>
    <div class="progress">Before you go</div>
    <h2>What you are taking away</h2>
    <div class="card" id="qbox"></div>
    <button class="btn" id="next">Finish</button>
  </div>`);
  const box = node.querySelector("#qbox");
  CONTENT.qualPost.forEach(item => {
    const q = el(`<div class="q"><div class="qtext">${esc(item.text)}</div></div>`);
    const ta = el(`<textarea placeholder="Write as much or as little as you like."></textarea>`);
    ta.value = store[item.id] || "";
    ta.addEventListener("input", ()=>{ store[item.id]=ta.value; saveState(); });
    q.appendChild(ta);
    box.appendChild(q);
  });
  node.querySelector("#next").addEventListener("click", async ()=>{
    const btn = node.querySelector("#next"); btn.disabled=true; btn.textContent="Saving.";
    const payload = buildBatteryPayload("post");
    await insertRow("response", { token: state.token, session_code: SESSION, phase: "post", payload });
    state.stage = "post_hold"; render();
  });
  return node;
}

/* ===================== DURING: facilitated reflection (one question per screen) =====================
   Holds are social gates: a calm waiting screen the participant leaves only when the
   facilitator cues the room to tap Continue. During model (token-paired, anonymous):
   reflections{ horizon_past, live_decide_by, live_window, live_perspectives[3],
   future_dilemma, future_decide_by, future_perspective{person,brings}, future_who_you_become }. */
function ensureDuring(){
  const d = state.during = state.during || {};
  if (!Array.isArray(d.live_perspectives)) d.live_perspectives = [{person:"",brings:""},{person:"",brings:""}];
  if (!d.future_perspective || typeof d.future_perspective !== "object") d.future_perspective = {person:"",brings:""};
  return d;
}
function duringPayload(){
  const d = ensureDuring();
  return { reflections: {
    horizon_past: d.horizon_past || "",
    past_outcome: d.past_outcome || "",
    live_decision: d.live_decision || "",
    live_decide_by: d.live_decide_by || "",
    live_perspectives: d.live_perspectives.map(p=>({ person: p.person||"", brings: p.brings||"" })),
    future_dilemma: d.future_dilemma || "",
    future_decision: d.future_decision || "",
    future_decide_by: d.future_decide_by || "",
    future_perspective: { person: d.future_perspective.person||"", brings: d.future_perspective.brings||"" },
    future_who_you_become: d.future_who_you_become || ""
  }};
}
/* Save on each Continue: instant local save, plus a server insert so partial reflections
   survive a dropped phone. The during row is rewritten each time; dedup keeps the latest
   (most complete) per phase. awaitIt=true on the final screen guarantees the complete row
   lands before the post survey. */
function saveDuring(awaitIt){
  saveState();
  const p = insertRow("response", { token: state.token, session_code: SESSION, phase: "during", payload: duringPayload() });
  return awaitIt ? p : Promise.resolve();
}
function bindInput(node, sel, getv, setv){ const e=node.querySelector(sel); e.value=getv()||""; e.addEventListener("input",()=>{ setv(e.value); saveState(); }); }
function liveAnchor(){
  const q1 = ((state.qpreAns && state.qpreAns.q1) || "").trim();
  return q1
    ? `Earlier you named the main uncertainty facing you today as: "${esc(q1)}".`
    : "Bring to mind the main uncertainty facing you today.";
}

/* Social-gate holds. The participant taps Continue only on the facilitator's verbal cue. */
function holdScreen(brand, heading, body, nextStage, primary){
  const node = el(`<div class="center">
    <div class="brand">${esc(brand)}</div>
    <h2>${esc(heading)}</h2>
    <p class="muted">${esc(body)}</p>
    <p style="margin-top:22px"><span class="dot"></span></p>
    <button class="btn ${primary ? "" : "secondary"}" id="go">Continue when prompted</button>
  </div>`);
  node.querySelector("#go").addEventListener("click", ()=>{ state.stage = nextStage; render(); });
  return node;
}
/* Pause after the two opener questions, before the scored check-in. */
function viewHoldOpener(){ return holdScreen("Hold here", "Stay with that.", "We'll take the measure together in a moment. Tap Continue when prompted.", "pre_battery", false); }
function viewHoldA(){ ensureDuring(); return holdScreen("Thank you", "That's the opening measure done.", "We'll move through three short reflections together. Tap Continue when prompted.", "s1", false); }
function viewHoldB(){ return holdScreen("Hold here", "Stay with that.", "Tap Continue when prompted.", "s2", false); }
function viewHoldC(){ return holdScreen("Hold here", "Last one together.", "Hold there. Tap Continue when prompted.", "s4", false); }
function viewHoldD(){ return holdScreen("Almost done", "That's the reflection done.", "One last short measure before we close. Tap Continue when prompted.", "post_battery", true); }
/* Pause after the post check-in, before the closing screen. */
function viewPostHold(){
  const node = el(`<div class="center">
    <div class="brand">Thank you</div>
    <h2>Hold here for a moment.</h2>
    <p class="muted">Your final check-in is saved. Wait for the room before you finish.</p>
    <p style="margin-top:22px"><span class="dot"></span></p>
    <button class="btn" id="go">Continue when prompted</button>
  </div>`);
  node.querySelector("#go").addEventListener("click", ()=>{ state.stage="close"; render(); });
  return node;
}

/* ---------------- During input screens (S1-S6), one question per screen ---------------- */
function viewS1(){
  ensureDuring();
  const node = el(`<div>
    <div class="progress">Reflection 1 of 3</div>
    <span class="lens-tag">Horizon</span>
    <h2>A past decision</h2>
    <p>Bring to mind a decision you made under pressure, and came to regret.</p>
    <div class="card">
      <label class="field" for="t1">Looking back, what could you have done to change the timeline you were under?</label>
      <textarea id="t1" placeholder="Write as much or as little as you like."></textarea>
      <label class="field" for="t2">And how would that have changed the outcome?</label>
      <textarea id="t2" placeholder="Write as much or as little as you like."></textarea>
    </div>
    <button class="btn" id="next">Continue</button>
  </div>`);
  bindInput(node, "#t1", ()=>state.during.horizon_past, v=>state.during.horizon_past=v);
  bindInput(node, "#t2", ()=>state.during.past_outcome, v=>state.during.past_outcome=v);
  node.querySelector("#next").addEventListener("click", ()=>{ saveDuring(false); state.stage="hold_b"; render(); });
  return node;
}
function viewS2(){
  ensureDuring();
  const node = el(`<div>
    <div class="progress">Reflection 2 of 3</div>
    <span class="lens-tag">Horizon + Altitude</span>
    <h2>Your live decision</h2>
    <p class="muted small">${liveAnchor()}</p>
    <p>What decision could you make to start to answer or alleviate it? It doesn't have to fix the whole thing.</p>
    <div class="card">
      <label class="field" for="ld">The decision</label>
      <textarea id="ld" placeholder="Write as much or as little as you like."></textarea>
      <label class="field" for="dd">By when will you make that decision?</label>
      <input id="dd" type="date" />
    </div>
    <button class="btn" id="next">Continue</button>
  </div>`);
  bindInput(node, "#ld", ()=>state.during.live_decision, v=>state.during.live_decision=v);
  bindInput(node, "#dd", ()=>state.during.live_decide_by, v=>state.during.live_decide_by=v);
  node.querySelector("#next").addEventListener("click", ()=>{ saveDuring(false); state.stage="s3"; render(); });
  return node;
}
function viewS3(){
  const d = ensureDuring();
  const node = el(`<div>
    <div class="progress">Reflection 2 of 3</div>
    <span class="lens-tag">Horizon + Altitude</span>
    <h2>Who would help you see this differently?</h2>
    <p class="muted small">${liveAnchor()}</p>
    <p>Name one or two real people who'd give you a valuable contrarian view on the opportunity in it, even if it challenges the one you hold.</p>
    <div class="card" id="rows"></div>
    <div class="muted small" style="margin-top:8px">Keep these names for yourself, on your card.</div>
    <div class="err" id="e3"></div>
    <button class="btn" id="next">Continue</button>
  </div>`);
  const rows = node.querySelector("#rows");
  d.live_perspectives.forEach((p, idx)=>{
    const wrap = el(`<div class="q"><div class="qtext">${idx===0 ? "Person 1 (required)" : "Person "+(idx+1)+" (optional)"}</div></div>`);
    const pe = el(`<input type="text" placeholder="Name" />`); pe.value=p.person||""; pe.addEventListener("input",()=>{ p.person=pe.value; saveState(); });
    const be = el(`<input type="text" placeholder="What they'd bring" style="margin-top:8px" />`); be.value=p.brings||""; be.addEventListener("input",()=>{ p.brings=be.value; saveState(); });
    wrap.appendChild(pe); wrap.appendChild(be); rows.appendChild(wrap);
  });
  node.querySelector("#next").addEventListener("click", ()=>{
    if (!((d.live_perspectives[0].person)||"").trim()){ node.querySelector("#e3").textContent="Please name at least one person."; return; }
    saveDuring(false); state.stage="hold_c"; render();
  });
  return node;
}
function viewS4(){
  ensureDuring();
  const node = el(`<div>
    <div class="progress">Reflection 3 of 3</div>
    <span class="lens-tag">Horizon + Altitude + Agency</span>
    <h2>A dilemma you can see coming</h2>
    <p>Think of a dilemma a year or two out.</p>
    <div class="card">
      <label class="field" for="dil">What's the long-range dilemma?</label>
      <input id="dil" type="text" placeholder="Name it" />
      <label class="field" for="fdec">A smaller, shorter-term decision you could make that begins to answer or alleviate it</label>
      <textarea id="fdec" placeholder="Write as much or as little as you like."></textarea>
      <label class="field" for="fd">By when will you make that smaller decision?</label>
      <input id="fd" type="date" />
    </div>
    <button class="btn" id="next">Continue</button>
  </div>`);
  bindInput(node, "#dil", ()=>state.during.future_dilemma, v=>state.during.future_dilemma=v);
  bindInput(node, "#fdec", ()=>state.during.future_decision, v=>state.during.future_decision=v);
  bindInput(node, "#fd", ()=>state.during.future_decide_by, v=>state.during.future_decide_by=v);
  node.querySelector("#next").addEventListener("click", ()=>{ saveDuring(false); state.stage="s5"; render(); });
  return node;
}
function viewS5(){
  const d = ensureDuring();
  const fp = d.future_perspective;
  const node = el(`<div>
    <div class="progress">Reflection 3 of 3</div>
    <span class="lens-tag">Horizon + Altitude + Agency</span>
    <h2>Whose perspective could you get?</h2>
    <p>Whose alternative perspective could you get in that time, and what would they bring?</p>
    <div class="card">
      <input id="fp_p" type="text" placeholder="Name" />
      <input id="fp_b" type="text" placeholder="What they'd bring" style="margin-top:10px" />
    </div>
    <button class="btn" id="next">Continue</button>
  </div>`);
  const pe=node.querySelector("#fp_p"); pe.value=fp.person||""; pe.addEventListener("input",()=>{ fp.person=pe.value; saveState(); });
  const be=node.querySelector("#fp_b"); be.value=fp.brings||""; be.addEventListener("input",()=>{ fp.brings=be.value; saveState(); });
  node.querySelector("#next").addEventListener("click", ()=>{ saveDuring(false); state.stage="s6"; render(); });
  return node;
}
function viewS6(){
  ensureDuring();
  const node = el(`<div>
    <div class="progress">Reflection 3 of 3</div>
    <span class="lens-tag">Horizon + Altitude + Agency</span>
    <h2>The leader you become</h2>
    <p>If you could hold the open using these three lenses whenever you face uncertainty, what kind of leader would you become?</p>
    <div class="card"><textarea id="t" placeholder="Write as much or as little as you like."></textarea></div>
    <button class="btn" id="next">Continue</button>
  </div>`);
  bindInput(node, "#t", ()=>state.during.future_who_you_become, v=>state.during.future_who_you_become=v);
  node.querySelector("#next").addEventListener("click", async ()=>{
    const btn=node.querySelector("#next"); btn.disabled=true; btn.textContent="Saving.";
    await saveDuring(true);   // ensure the complete during row lands before the post survey
    state.stage="hold_d"; render();
  });
  return node;
}

/* Best-effort reflections email. Fire and forget: the email address lives only
   in the browser and is passed to the server-side function for the send. It is
   never stored beside answers. A failure here must never block the close screen. */
function sendReflections(){
  if (state.emailRequested) return;          // send at most once per device
  if (!state.email) return;
  state.emailRequested = true; saveState();
  try {
    fetch(SB_URL + "/functions/v1/send-reflections", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY },
      body: JSON.stringify({ token: state.token, email: state.email, first_name: state.first_name })
    }).catch(()=>{});
  } catch(e) { /* never block completion */ }
}

/* ---------------- Close ---------------- */
function viewClose(){
  sendReflections();
  return el(`<div class="center">
    <div class="brand">Thank you, ${esc(state.first_name||"")}</div>
    <h2>That is everything.</h2>
    <p class="muted">Your responses are saved anonymously. We will email your own reflections to you after the session.</p>
    <p class="muted small" style="margin-top:18px">You can close this page.</p>
  </div>`);
}

/* ---------------------------- boot ---------------------------- */
flushQueue();
window.addEventListener("online", flushQueue);
render();
</script>
